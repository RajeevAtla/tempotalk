[paths]
market_csv = "data/mock/market_intelligence.csv"
crm_csv = "data/mock/crm_notes.csv"
kb_markdown = "data/mock/product_kb.md"
output_dir = "outputs"

[models]
generation_provider = "google"
generation_model = "gemini-2.5-flash"
embedding_provider = "google"
embedding_model = "gemini-embedding-001"

[ranking.weights]
patient_volume = 0.45
clinical_fit = 0.3
objection_urgency = 0.15
recency = 0.1

[ranking.calibration.concern_severity]
turnaround_time = 1.0
reimbursement = 0.75
evidence_strength = 0.85
workflow_fit = 0.6
general = 0.5

[ranking.calibration.specialty_fit]
Oncology = 1.0
Hematology = 0.85
"Thoracic Oncology" = 0.95
default = 0.7

[rag]
chunk_size = 500
chunk_overlap = 75
top_k = 4
embedding_dimension = 128

[mock]
seed = 42
scale = 25
