name: CI

on:
  push:
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - name: Sync deps
        run: uv sync --locked --dev
      - name: Generate BAML client
        run: uv run baml-cli generate
      - name: Verify generated BAML client is in sync
        run: git diff --exit-code -- baml_client baml_src
      - name: Ruff
        run: uv run ruff check .
      - name: Ty
        run: uv run ty check
      - name: Pytest
        run: uv run pytest -q
